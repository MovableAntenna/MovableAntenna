<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硬件实现 · 双天线协同感知</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* 硬件页特有样式：极简、左右分栏、折叠卡片 */
        .hardware-layout {
            display: flex;
            gap: 60px;
            margin: 60px 0 80px;
            align-items: flex-start;
        }
        
        /* 左侧选项区 */
        .spec-list {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .spec-item {
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        
        .spec-trigger {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 0;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
        }
        
        .spec-trigger:hover {
            color: var(--primary);
        }
        
        .spec-trigger .plus-icon {
            font-size: 1.8rem;
            font-weight: 300;
            color: var(--text-secondary);
            transition: transform 0.3s ease;
            width: 28px;
            text-align: center;
        }
        
        .spec-item.expanded .plus-icon {
            transform: rotate(45deg);
            color: var(--primary);
        }
        
        .spec-trigger .label {
            flex: 1;
        }
        
        .spec-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            padding-left: 40px;
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .spec-item.expanded .spec-content {
            max-height: 150px;  /* 足够容纳描述文字 */
            padding-bottom: 16px;
        }
        
        /* 右侧图片区 */
        .spec-preview {
            flex: 1;
            min-height: 520px;
            background: #fafafa;
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            padding: 20px;
            transition: opacity 0.3s ease;
        }
        
        /* 大标题与首页 hero 一致 */
        .hardware-hero {
            text-align: center;
            padding: 40px 0 20px;
        }
        
        .hardware-hero h1 {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        
        /* 响应式 */
        @media (max-width: 900px) {
            .hardware-layout {
                flex-direction: column;
                gap: 30px;
            }
            .spec-list {
                flex: 0 0 auto;
                width: 100%;
            }
            .spec-preview {
                min-height: 350px;
                width: 100%;
            }
            .hardware-hero h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏（液态玻璃效果已在全局CSS中定义） -->
        <nav class="navbar">
            <a href="index.html">首页</a>
            <a href="system.html">系统设计</a>
            <a href="hardware.html" class="active">硬件实现</a>
            <a href="experiments.html">实验测试</a>
            <a href="publications.html">论文</a>
        </nav>

        <!-- 唯一的居中大标题 -->
        <div class="hardware-hero">
            <h1>硬件系统实现</h1>
        </div>

        <!-- 左右分栏核心区域 -->
        <div class="hardware-layout">
            <!-- 左侧折叠选项 -->
            <div class="spec-list">
                <!-- 整体系统 -->
                <div class="spec-item expanded" data-image="overall">
                    <button class="spec-trigger">
                        <span class="plus-icon">+</span>
                        <span class="label">整体系统</span>
                    </button>
                    <div class="spec-content">
                        天线、导轨与舵机全貌。发射天线固定于导轨一端，接收天线搭载于滑块，配合双轴舵机实现精确指向。
                    </div>
                </div>
                <!-- 导轨特写 -->
                <div class="spec-item" data-image="rail">
                    <button class="spec-trigger">
                        <span class="plus-icon">+</span>
                        <span class="label">精密导轨</span>
                    </button>
                    <div class="spec-content">
                        MGN12H 直线导轨，行程300mm。滑块搭载接收天线，通过步进电机驱动实现大范围位置调整。
                    </div>
                </div>
                <!-- 电路系统 -->
                <div class="spec-item" data-image="circuit">
                    <button class="spec-trigger">
                        <span class="plus-icon">+</span>
                        <span class="label">电路系统</span>
                    </button>
                    <div class="spec-content">
                        STM32F103 主控、A7105 射频前端、A4988 电机驱动。集成信号采集、算法解算与运动控制。
                    </div>
                </div>
                <!-- 舵机云台 -->
                <div class="spec-item" data-image="servo">
                    <button class="spec-trigger">
                        <span class="plus-icon">+</span>
                        <span class="label">舵机云台</span>
                    </button>
                    <div class="spec-content">
                        双轴 MG996R 舵机提供方位与俯仰微调。与导轨平移联动，实现“粗调＋精调”的复合指向。
                    </div>
                </div>
            </div>

            <!-- 右侧大图预览区 -->
            <div class="spec-preview">
                <img id="previewImage" class="preview-image" src="assets/images/hardware-overall.jpg" alt="整体系统">
            </div>
        </div>

        <!-- 极简页脚 -->
        <footer class="footer">
            <p>第二十一届中国研究生电子设计竞赛 · 参赛作品</p>
        </footer>
    </div>

    <script>
        (function() {
            // 图片映射
            const imageMap = {
                'overall': 'assets/images/hardware-overall.jpg',
                'rail': 'assets/images/hardware-rail.jpg',
                'circuit': 'assets/images/hardware-circuit.jpg',
                'servo': 'assets/images/hardware-servo.jpg'
            };
            
            const previewImg = document.getElementById('previewImage');
            const items = document.querySelectorAll('.spec-item');
            
            // 预加载所有图片
            Object.values(imageMap).forEach(src => {
                const img = new Image();
                img.src = src;
            });
            
            // 切换图片（带淡入效果）
            function switchImage(imageKey) {
                const targetSrc = imageMap[imageKey];
                if (!targetSrc) return;
                
                // 创建新图片实现淡入
                const newImg = new Image();
                newImg.src = targetSrc;
                newImg.alt = previewImg.alt;
                newImg.className = 'preview-image';
                newImg.style.opacity = '0';
                
                newImg.onload = () => {
                    const container = previewImg.parentNode;
                    container.appendChild(newImg);
                    
                    requestAnimationFrame(() => {
                        newImg.style.transition = 'opacity 0.3s ease';
                        newImg.style.opacity = '1';
                    });
                    
                    // 移除旧图
                    if (previewImg && previewImg !== newImg) {
                        previewImg.style.transition = 'opacity 0.2s ease';
                        previewImg.style.opacity = '0';
                        setTimeout(() => {
                            if (previewImg.parentNode === container) {
                                container.removeChild(previewImg);
                            }
                        }, 200);
                    }
                    
                    // 更新全局引用（注意：原 previewImg 元素会被替换，需重新获取）
                    document.getElementById('previewImage')?.removeAttribute('id');
                    newImg.id = 'previewImage';
                };
            }
            
            // 处理折叠/展开与图片切换
            items.forEach(item => {
                const trigger = item.querySelector('.spec-trigger');
                const imageKey = item.dataset.image;
                
                trigger.addEventListener('click', function(e) {
                    e.stopPropagation();
                    
                    // 切换当前项的展开状态
                    const isExpanded = item.classList.contains('expanded');
                    
                    // 收起其他所有项（可选：苹果风格通常允许同时展开多个，但这里为了简洁采用手风琴效果）
                    items.forEach(i => i.classList.remove('expanded'));
                    
                    // 如果之前是收起的，则展开
                    if (!isExpanded) {
                        item.classList.add('expanded');
                        // 切换右侧图片
                        switchImage(imageKey);
                    } else {
                        // 如果点击已展开项，仅收起，图片可保持不变或切回默认？这里保持图片不变
                        // 但为了体验，如果收起所有项，可以保留最后显示的图片
                    }
                });
            });
            
            // 默认展开第一项（已通过 expanded 类处理）
            // 确保右侧图片与第一项一致
        })();
    </script>
    
    <!-- 全局交互脚本（导航高亮、滚动吸附等） -->
    <script src="assets/js/main.js"></script>
</body>
</html>
