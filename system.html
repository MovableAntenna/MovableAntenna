<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设计 · 双天线协同感知</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* 系统设计页特有样式：左右分栏、折叠卡片、三个阶段 */
        .system-layout {
            display: flex;
            gap: 60px;
            margin: 60px 0 80px;
            align-items: flex-start;
        }
        
        /* 左侧阶段列表 */
        .phase-list {
            flex: 0 0 320px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .phase-item {
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        
        .phase-trigger {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 0;
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
        }
        
        .phase-trigger:hover {
            color: var(--primary);
        }
        
        /* 图标圆圈 */
        .icon-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.04);
            color: var(--text-secondary);
            font-size: 1.6rem;
            font-weight: 300;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }
        
        .phase-item.expanded .icon-circle {
            background: var(--primary);
            color: white;
        }
        
        .phase-trigger .label {
            flex: 1;
        }
        
        .phase-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.33, 1, 0.68, 1);
            padding-left: 48px;  /* 32px圆圈 + 16px间距 */
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.7;
        }
        
        .phase-item.expanded .phase-content {
            max-height: 300px;   /* 足够容纳描述文字 */
            padding-bottom: 20px;
        }
        
        /* 右侧图片预览区 */
        .phase-preview {
            flex: 1;
            min-height: 550px;
            background: #fafafa;
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            padding: 20px;
            transition: opacity 0.3s ease;
        }
        
        /* 大标题 */
        .system-hero {
            text-align: center;
            padding: 40px 0 20px;
        }
        
        .system-hero h1 {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        
        /* 响应式 */
        @media (max-width: 900px) {
            .system-layout {
                flex-direction: column;
                gap: 30px;
            }
            .phase-list {
                flex: 0 0 auto;
                width: 100%;
            }
            .phase-preview {
                min-height: 350px;
                width: 100%;
            }
            .system-hero h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏（液态玻璃效果） -->
        <nav class="navbar">
            <a href="index.html">首页</a>
            <a href="system.html" class="active">系统设计</a>
            <a href="hardware.html">硬件实现</a>
            <a href="experiments.html">实验测试</a>
            <a href="publications.html">论文</a>
        </nav>

        <!-- 居中大标题 -->
        <div class="system-hero">
            <h1>系统工作流程</h1>
        </div>

        <!-- 左右分栏核心区域 -->
        <div class="system-layout">
            <!-- 左侧阶段列表（三个） -->
            <div class="phase-list">
                <!-- 阶段 1：扫描感知 -->
                <div class="phase-item" data-phase="scan">
                    <button class="phase-trigger">
                        <span class="icon-circle">+</span>
                        <span class="label">1. 扫描感知</span>
                    </button>
                    <div class="phase-content">
                        发射天线持续照射目标区域，接收天线在导轨上往复移动，采集不同位置的RSSI信号强度，形成空间扫描数据。
                    </div>
                </div>
                <!-- 阶段 2：捕获定位 -->
                <div class="phase-item" data-phase="capture">
                    <button class="phase-trigger">
                        <span class="icon-circle">+</span>
                        <span class="label">2. 捕获定位</span>
                    </button>
                    <div class="phase-content">
                        嵌入式处理器对RSSI序列进行峰值搜索与滤波，解算出无人机目标的初始方位角，驱动导轨滑块移动至对应区域。
                    </div>
                </div>
                <!-- 阶段 3：跟踪对准 -->
                <div class="phase-item" data-phase="track">
                    <button class="phase-trigger">
                        <span class="icon-circle">+</span>
                        <span class="label">3. 跟踪对准</span>
                    </button>
                    <div class="phase-content">
                        双轴舵机云台根据实时信号强度进行微调，补偿导轨定位误差与目标移动，实现高精度持续指向跟踪，形成闭环锁定。
                    </div>
                </div>
            </div>

            <!-- 右侧大图预览区 -->
            <div class="phase-preview">
                <img id="previewImage" class="preview-image" src="assets/images/phase-scan.png" alt="扫描感知示意图">
            </div>
        </div>

        <!-- 极简页脚 -->
        <footer class="footer">
            <p>第二十一届中国研究生电子设计竞赛 · 参赛作品</p>
        </footer>
    </div>

    <script>
        (function() {
            // ---------- 阶段图片映射（三个图） ----------
            const imageMap = {
                'scan': 'assets/images/phase-scan.png',      // 扫描感知示意图
                'capture': 'assets/images/phase-capture.png', // 捕获定位示意图
                'track': 'assets/images/phase-track.png'      // 跟踪对准示意图
            };

            const previewContainer = document.querySelector('.phase-preview');
            const previewImg = document.getElementById('previewImage');
            const items = document.querySelectorAll('.phase-item');

            // 预加载所有图片
            Object.values(imageMap).forEach(src => {
                const img = new Image();
                img.src = src;
            });

            // 切换图片（淡入淡出）
            function switchImage(phaseKey) {
                const targetSrc = imageMap[phaseKey];
                if (!targetSrc) return;

                const newImg = new Image();
                newImg.src = targetSrc;
                newImg.alt = '系统阶段示意图';
                newImg.className = 'preview-image';
                newImg.style.opacity = '0';

                newImg.onload = () => {
                    previewContainer.appendChild(newImg);
                    requestAnimationFrame(() => {
                        newImg.style.transition = 'opacity 0.3s ease';
                        newImg.style.opacity = '1';
                    });

                    // 移除旧图
                    const oldImg = previewContainer.querySelector('#previewImage');
                    if (oldImg && oldImg !== newImg) {
                        oldImg.style.transition = 'opacity 0.2s ease';
                        oldImg.style.opacity = '0';
                        setTimeout(() => {
                            if (oldImg.parentNode === previewContainer) {
                                previewContainer.removeChild(oldImg);
                            }
                        }, 200);
                    }
                    newImg.id = 'previewImage';
                };
            }

            // 更新所有图标（+ / −）
            function updateAllIcons() {
                items.forEach(item => {
                    const icon = item.querySelector('.icon-circle');
                    if (icon) {
                        icon.textContent = item.classList.contains('expanded') ? '−' : '+';
                    }
                });
            }

            // 收起其他项（手风琴效果）
            function collapseOthers(currentItem) {
                items.forEach(item => {
                    if (item !== currentItem && item.classList.contains('expanded')) {
                        item.classList.remove('expanded');
                    }
                });
            }

            // 绑定点击事件
            items.forEach(item => {
                const trigger = item.querySelector('.phase-trigger');
                trigger.addEventListener('click', () => {
                    const isExpanded = item.classList.contains('expanded');
                    const phaseKey = item.dataset.phase;

                    // 收起其他项
                    collapseOthers(item);

                    // 切换当前项
                    if (!isExpanded) {
                        item.classList.add('expanded');
                        if (phaseKey) switchImage(phaseKey);
                    } else {
                        item.classList.remove('expanded');
                        // 收起时图片保持不动
                    }

                    updateAllIcons();
                });
            });

            // 初始化：默认展开第一阶段（扫描感知）
            const firstItem = items[0];
            if (firstItem) {
                items.forEach(item => item.classList.remove('expanded'));
                firstItem.classList.add('expanded');
                updateAllIcons();
                const firstKey = firstItem.dataset.phase;
                if (firstKey) switchImage(firstKey);
            }
        })();
    </script>
    
    <script src="assets/js/main.js"></script>
</body>
</html>
