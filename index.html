<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双天线协同感知 · 无人机指向跟踪系统</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }
        .container {
            max-width: 100%;
            padding: 0;
        }

        /* 导航栏：固定，初始透明 */
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            z-index: 200;  /* 高于文字和视频，保证始终可点 */
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            box-shadow: none;
            transition: background 0.3s, backdrop-filter 0.3s, box-shadow 0.3s;
            padding: 12px 24px;
            border-radius: 60px;
        }
        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        /* 固定文字区域：永远居中，z-index 较低，会被视频覆盖 */
        .fixed-hero {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;      /* 低于视频的 z-index */
            width: 100%;
            pointer-events: none;  /* 让点击穿透，不影响导航 */
            padding: 20px;
            box-sizing: border-box;
        }

        .main-title {
            font-size: 4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 20px;
            color: #1d1d1f;
        }

        .team-info {
            font-size: 1.4rem;
            color: #86868b;
            margin-bottom: 30px;
        }

        .logo-container {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .logo-container img {
            height: 60px;
            width: auto;
            object-fit: contain;
        }

        /* 视频容器：相对定位，高 z-index，会覆盖固定文字 */
        .video-section {
            position: relative;
            width: 100%;
            height: 100vh;
            margin-top: 100vh;  /* 关键：视频从第一屏下方开始，滚动后才进入视口 */
            z-index: 50;         /* 高于固定文字，实现遮挡 */
            background: #000;
        }

        .video-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 30px;
            color: #86868b;
            background: white;
            position: relative;
            z-index: 5;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5rem;
            }
            .team-info {
                font-size: 1.1rem;
            }
            .logo-container {
                gap: 20px;
            }
            .logo-container img {
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 固定导航栏 -->
        <nav class="navbar" id="mainNav">
            <a href="index.html" class="active">首页</a>
            <a href="system.html">系统设计</a>
            <a href="hardware.html">硬件实现</a>
            <a href="experiments.html">实验测试</a>
            <a href="publications.html">论文</a>
        </nav>

        <!-- 固定不动的标题、队名、Logo -->
        <div class="fixed-hero">
            <h1 class="main-title">平移 · 感知 · 追踪</h1>
            <div class="team-info">
                <p>参赛队名：天线感知与指向团队</p>
                <p>队员：张三 · 李四 · 王五</p>
            </div>
            <div class="logo-container">
                <!-- 请替换为实际Logo文件路径 -->
                <img src="assets/images/logo-committee.png" alt="研电赛组委会Logo">
                <img src="assets/images/logo-year.png" alt="2026研电赛Logo">
            </div>
        </div>

        <!-- 视频区域：从第二屏开始，覆盖固定文字 -->
        <div class="video-section">
            <iframe 
                class="video-iframe"
                src="//player.bilibili.com/player.html?bvid=BV1xx411x7x&page=1&autoplay=0" 
                scrolling="no" 
                border="0" 
                frameborder="no" 
                framespacing="0" 
                allowfullscreen="true">
            </iframe>
        </div>

        <!-- 页脚 -->
        <footer class="footer">
            <p>第二十一届中国研究生电子设计竞赛 · 参赛作品</p>
        </footer>
    </div>

    <script>
        (function() {
            const navbar = document.getElementById('mainNav');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        })();
    </script>
    
    <script src="assets/js/main.js"></script>
</body>
</html>
